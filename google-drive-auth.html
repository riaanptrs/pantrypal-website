<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VivaPantry Google Drive Callback</title>
</head>
<body style="font-family: Arial, Helvetica, sans-serif; padding: 24px;">
  <p>Returning to VivaPantry...</p>
  <script>
    (function () {
      const query = window.location.search || '';
      const hash = window.location.hash || '';
      const payload = `${query}${hash}`;
      const nextUrl = `vivapantry://google-drive-auth${payload}`;
      const legacyUrl = `pantrypal://google-drive-auth${payload}`;

      window.location.replace(nextUrl);

      setTimeout(function () {
        window.location.replace(legacyUrl);
      }, 500);
    })();
  </script>
</body>
</html>
