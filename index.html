<script>
  function showLang(lang, buttonEl) {
    const pt = document.getElementById('pt-content');
    const en = document.getElementById('en-content');
    const buttons = document.querySelectorAll('.lang-btn');

    if (lang === 'pt') {
      pt.classList.remove('hidden');
      en.classList.add('hidden');
    } else {
      en.classList.remove('hidden');
      pt.classList.add('hidden');
    }

    buttons.forEach(btn => btn.classList.remove('active'));
    if (buttonEl) buttonEl.classList.add('active');
  }

  function getDeepLinkUrl() {
    const search = window.location.search || '';
    const hash = window.location.hash || '';
    return `pantrypal://callback${search}${hash}`;
  }

  function looksLikeAuthCallback() {
    const fullUrl = `${window.location.search}${window.location.hash}`.toLowerCase();

    return (
      fullUrl.includes('access_token=') ||
      fullUrl.includes('refresh_token=') ||
      fullUrl.includes('type=signup') ||
      fullUrl.includes('type=recovery') ||
      fullUrl.includes('type=invite') ||
      fullUrl.includes('type=magiclink') ||
      fullUrl.includes('code=')
    );
  }

  function renderOpenAppFallback() {
    const container = document.querySelector('.container');
    if (!container) return;

    const card = document.createElement('section');
    card.className = 'card';
    card.innerHTML = `
      <h2>Open PantryPal</h2>
      <p class="muted">
        If the app did not open automatically, tap the button below.
      </p>
      <p>
        <a
          href="${getDeepLinkUrl()}"
          style="
            display:inline-block;
            background:#2c7a7b;
            color:white;
            text-decoration:none;
            padding:12px 18px;
            border-radius:12px;
            font-weight:bold;
          "
        >
          Open PantryPal
        </a>
      </p>
    `;

    container.insertBefore(card, container.firstChild.nextSibling);
  }

  function tryOpenAppFromAuthCallback() {
    if (!looksLikeAuthCallback()) return;

    renderOpenAppFallback();

    const deepLink = getDeepLinkUrl();

    // Try to open the app automatically
    window.location.href = deepLink;
  }

  // Optional: support links like #en or #pt on page load
  function initializeLanguageFromHash() {
    const hash = (window.location.hash || '').toLowerCase();

    if (hash === '#en') {
      const enBtn = document.querySelectorAll('.lang-btn')[1];
      showLang('en', enBtn);
    } else {
      const ptBtn = document.querySelectorAll('.lang-btn')[0];
      showLang('pt', ptBtn);
    }
  }

  document.addEventListener('DOMContentLoaded', function () {
    initializeLanguageFromHash();
    tryOpenAppFromAuthCallback();
  });
</script>
